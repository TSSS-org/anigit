name: Release

# Triggers on any tag matching v*, e.g. v1.4.4 — push a tag to cut a release:
#   git tag v1.4.4 && git push origin v1.4.4
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # rusqlite's `bundled` feature compiles SQLite from C source, so
      # cross-compiling aarch64-on-Linux-runner needs a matching C
      # cross-compiler/linker available. x86_64 targets build natively on
      # their own runner OS and don't need this. (openssl-sys previously also
      # needed this kind of cross-compiled C toolchain and failed without a
      # full aarch64 OpenSSL sysroot — fixed by switching reqwest to the pure-
      # Rust rustls-tls backend instead, so only rusqlite's C code remains.)
      - name: Install aarch64 cross-compiler (Linux target only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../anigit-${{ matrix.target }}.tar.gz anigit
          cd -

      - name: Package binary (Windows)
        if: matrix.archive_ext == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../anigit-${{ matrix.target }}.zip anigit.exe
          cd -

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: anigit-${{ matrix.target }}
          path: anigit-${{ matrix.target }}.${{ matrix.archive_ext }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact directory
        run: |
          mkdir -p dist
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} dist/ \;
          ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
